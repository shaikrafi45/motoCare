<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>motoCare // Mobile Owner Dashboard</title>
  <!-- SEO & Meta tags -->
  <meta name="description" content="KTM-inspired mobile-first dashboard for bike servicing, dynamic telemetry gauges, color configurators, group rides, and accessory shops.">
  <meta name="theme-color" content="#ff5400">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <!-- Outer Wrapper: Centers the phone frame mockup on desktop -->
  <div class="desktop-wrapper">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      
      <!-- Phone Screen Container -->
      <div class="phone-screen">
        
        <!-- Top App Bar -->
        <header class="app-header">
          <div class="logo-box">
            <span class="logo-text">moto<span class="logo-orange">Care</span></span>
          </div>
          
          <div class="header-right-actions">
            <!-- Audio mute button -->
            <button class="header-btn" id="header-mute-btn" title="Toggle audio alerts">
              <svg id="mute-icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
              <svg id="mute-icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
            </button>
            
            <span class="status-live-tag">CONNECT</span>
          </div>
        </header>

        <!-- Dynamic Main Scroll Area -->
        <main class="phone-viewport">
          
          <!-- View 1: Garage Dashboard (Default) -->
          <section id="garage-view" class="view-panel active"></section>

          <!-- View 2: Servicing timeline booking / Technician / Manager views -->
          <section id="service-view" class="view-panel"></section>

          <!-- View 3: Bike Customizer Configurator -->
          <section id="config-view" class="view-panel"></section>

          <!-- View 4: Pro Group Rides Community -->
          <section id="rides-view" class="view-panel"></section>

          <!-- View 5: E-Commerce Powerwear Shop -->
          <section id="shop-view" class="view-panel"></section>

        </main>

        <!-- Bottom Native App Navigation Menu -->
        <nav class="phone-navbar">
          <button class="nav-item active" data-tab="garage" id="nav-garage">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-lbl">Garage</span>
          </button>
          
          <button class="nav-item" data-tab="service" id="nav-service">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
            <span class="nav-lbl">Service</span>
          </button>
          
          <button class="nav-item" data-tab="config" id="nav-config">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
              <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
              <line x1="12" y1="2" x2="12" y2="8"></line>
              <line x1="12" y1="16" x2="12" y2="22"></line>
            </svg>
            <span class="nav-lbl">Configure</span>
          </button>
          
          <button class="nav-item" data-tab="rides" id="nav-rides">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            <span class="nav-lbl">Rides</span>
          </button>
          
          <button class="nav-item" data-tab="shop" id="nav-shop">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="nav-lbl">Shop</span>
          </button>
        </nav>

      </div>
    </div>
  </div>

  <!-- Global Modal Overlay System -->
  <div class="modal-overlay" id="global-modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Config</h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body-content">
        <!-- Dynamic content injected here -->
      </div>
    </div>
  </div>

  <!-- Main JavaScript App module -->
  <script type="module" src="app.js"></script>
</body>
</html>
