<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoCare // On-Demand Bike Service Hub</title>
  <!-- SEO & Meta tags -->
  <meta name="description" content="Premium on-demand motorcycle repair and servicing web application. Home pickup, live tracking, mechanic checklists, and parts inventory control.">
  <meta name="theme-color" content="#f97316">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-customer-active">
  <div class="app-layout">
    
    <!-- Top Role Toggling Header Bar -->
    <header class="app-header">
      <div class="header-left">
        <!-- Logo -->
        <div class="logo-box">
          <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
          </svg>
          <span class="logo-text">Moto<span class="logo-orange">Care</span></span>
          <span class="logo-badge">EXPRESS</span>
        </div>
      </div>

      <!-- Center status display or tag -->
      <div class="header-center-info">
        <span class="hub-status-tag" id="header-status-indicator">ON-DEMAND REPAIRS</span>
      </div>

      <!-- Right Role Selector & Sound Control -->
      <div class="header-right">
        <!-- Audio station mute -->
        <button class="header-btn" id="header-mute-btn" title="Toggle audio alerts">
          <svg id="mute-icon-unmuted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          <svg id="mute-icon-muted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        </button>

        <!-- Dynamic Role Selector Dropdown -->
        <div class="role-selector-box">
          <label for="app-role-selector" class="role-lbl">Access Portal</label>
          <select id="app-role-selector" class="select-input role-select">
            <option value="customer" selected>Customer Portal</option>
            <option value="technician">Technician/Service Portal</option>
            <option value="manager">Shop Manager Console</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Main Viewport Space -->
    <main class="main-viewport">
      
      <!-- Customer View container -->
      <section id="customer-view" class="view-panel active"></section>

      <!-- Technician View container -->
      <section id="technician-view" class="view-panel"></section>

      <!-- Manager View container -->
      <section id="manager-view" class="view-panel"></section>

    </main>
    
  </div>

  <!-- Global Modal Overlay -->
  <div class="modal-overlay" id="global-modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Inventory Setup</h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body-content">
        <!-- Dynamic content injected here -->
      </div>
    </div>
  </div>

  <!-- Main JavaScript App -->
  <script type="module" src="app.js"></script>
</body>
</html>
